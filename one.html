<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Casting</title>
    <link rel="stylesheet" href="icon.css">
    

   
</head>
<body>

<div class="container">

    <!-- Top connection box -->
    <div class="box">
        <i class="fa-solid fa-tv" id="icon"></i>
        <h3 class="head">Connected : Android-61</h3>
        <h3 id="head2" class="head">Disconnect</h3>
    </div>

    <!-- Casting icon/image -->
    <div class="img">
        <img src="OIP.webp" alt="Casting">
    </div>

    <!-- Casting status -->
    <div class="heart">
        <h2 id="cast">🛜 Casting</h2>
        <button id="btn">Stop Casting</button>
    </div>

    <!-- Bottom options -->
    <div class="hero">
        <div class="hero-left">
            <i class="fa-solid fa-bars"></i>
            <span>More</span>
        </div>

        <div class="hero-right">
            <img src="icons8-desktop-50.png" alt="Screen Cast">
            <span>Screen Casting content</span>
        </div>
    </div>

</div>

</body>
</html>
